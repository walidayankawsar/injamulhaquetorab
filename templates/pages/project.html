{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAWSAR | Projects</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{% static "css/all.css" %}">
    <link rel="stylesheet" href="{% static "css/project.css" %}">
</head>

<body id="body" class="dark-mode">
    <nav class="navbar navbar-expand-lg">
        <div class="">
            <a class="navbar-brand" href="../index">Walid Ayaan Kawsar</a>
        </div>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'about' %}">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'project' %}">Projects</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'publications' %}">Publications</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'blog' %}">Blog</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contact' %}">Contact</a>
                </li>
                <li>
                    <button class="nav-link" id="toggle-mode"><i class="fa-solid fa-sun"
                            style="color: #ffc800;"></i></button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- project start  -->
    <section>
        <div id="all-projects">
            <form method='get', action="{% url 'project_search' %}">
                <div class="input-group">
                    <input type="text" class="form-control" name='q' placeholder="Search Projects Here" value="{{ request.GET.q }}">
                    <div class="input-group-append">
                        <button class="btn btn-primary" type="submit" id="search-btn">
                            <i class="fa fa-search"></i>
                        </button>
                    </div>
                </div>
            </form>

            <div id="posts-container">

                {% for project in projects %}
                <a href="{% url 'viewProject' project.id %}" class="post">
                    <input type="hidden">
                    <button type="submit">
                        <h4>{{ project.project_name }}</h4>
                        <div>
                            <img class="project-img" src="../files/projectImage/project.jpeg" alt="">
                        </div>
                        <!-- Tag container -->
                        <div class="tags-container">
                            <Span style="font-weight: 800;">Tags: </Span>
			    {% for tag in project.tag.all %}
			        <span class="tag">{{ tag.Tag_name }}</span>
			    {% endfor %}
                        </div>
                        <p>{{ project.description|truncatewords:30 }}</p>
                        <p class="blog-date fst-italic fw-lighter">{{ project.date }}</p>
                    </button>
                </a>
                {% endfor %}

            </div>
        </div>
    </section>



    <footer>
        <a href="mailto: {{ link.mail }}"><i class="fa-solid fa-envelope"></i></a>
        <a href="{{ link.linkedin }}"><i class="fa-brands fa-linkedin"></i></a>
        <a href="{{ link.github }}"><i class="fa-brands fa-github"></i></a>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script src="{% static 'js/all.js' %}"></script>
</body>

</html>
